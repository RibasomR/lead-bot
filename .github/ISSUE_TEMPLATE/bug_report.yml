name: "🐛 Bug Report"
description: "Something isn't working? Tell us more."
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Bug description
      description: What happened?
      placeholder: "The bot doesn't send a reply after pressing the button..."
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the issue?
      placeholder: |
        1. Send /start
        2. Press "..." button
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened?
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: If available — paste logs or screenshots
    validations:
      required: false
  - type: dropdown
    id: deploy
    attributes:
      label: Deployment method
      options:
        - Docker Compose
        - Without Docker (manual)
    validations:
      required: true
